name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:linux:dir
      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
      - run: npm run dist:linux:all
      - run: npm run check:release-artifacts

      - name: Create checksums
        run: |
          cd release
          sha256sum *.deb *.rpm > checksums-linux.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.deb
            release/*.rpm
            release/checksums-linux.txt

  mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:mac:arm64

      - name: Create checksums
        run: |
          cd release
          shasum -a 256 *.dmg *.zip > checksums-mac-arm64.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/checksums-mac-arm64.txt

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:win

      - name: Create checksums
        shell: pwsh
        run: |
          Get-FileHash release\*.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Set-Content release\checksums-windows.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/checksums-windows.txt
